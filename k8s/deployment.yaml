apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
  namespace: test1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
        - name: php-app
          image: mohamedtolbapfs/test_kube:latest
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: certs
              mountPath: docker_prism/etc/letsencrypt
            - name: php-logs
              mountPath: /var/log/php
      volumes:
        - name: certs
          secret:
            secretName: tls-certs
        - name: php-logs
          persistentVolumeClaim:
            claimName: php-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: php-app-service
  namespace: test1
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
    - port: 443
      targetPort: 443
  selector:
    app: php-app
