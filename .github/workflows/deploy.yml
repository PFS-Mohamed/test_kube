name: CI/CD Docker Build & Deploy to ACK

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      IMAGE_NAME: mohamedtolbapfs/test_kube

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up Kubeconfig for ACK
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.ALIBABA_KUBECONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: vars
        run: echo "TAG=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest \
                       -t $REGISTRY/$IMAGE_NAME:${{ env.TAG }} \
                       -f docker_prism/dev/etc/Dockerfile docker_prism/dev
          docker push $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${{ env.TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Kubeconfig for ACK
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.ALIBABA_KUBECONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Create namespace if not exists
        run: |
          kubectl get ns test1 || kubectl create ns test1

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: mohamedtolbapfs/test_kube:.*|image: mohamedtolbapfs/test_kube:${{ env.TAG }}|" k8s/deployment.yaml

      - name: Deploy to ACK (Alibaba Cloud)
        run: |
          kubectl apply -f k8s/deployment.yaml
